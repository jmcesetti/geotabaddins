<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gestor de Grupos</title>
</head>
<body>
<div id="groupManager">

  <div class="card">
    <h1>Gestor de Grupos Masivo</h1>
    <p class="sub">Agregá y eliminá grupos de usuarios y activos en forma masiva</p>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" data-type="User">Usuarios</button>
      <button class="tab" data-type="Device">Activos</button>
    </div>
    <div class="row">
      <div class="fg">
        <label>Nombre</label>
        <input type="text" id="fName" placeholder="Filtrar por nombre...">
      </div>
      <div class="fg">
        <label>Filtrar por grupo</label>
        <div class="msel">
          <div class="mdisp" id="md0" tabindex="0"><span id="ml0">Todos los grupos</span><span>▾</span></div>
          <div class="mdrop" id="mdd0">
            <div class="msrch"><input type="text" id="ms0s" placeholder="Buscar grupo..."></div>
            <div class="mopts" id="ms0o"></div>
          </div>
        </div>
      </div>
      <button class="bp" id="btnLoad">Cargar datos</button>
      <button class="bs" id="btnClr">Limpiar filtros</button>
    </div>
    <div id="sts" class="sts hi"></div>
  </div>

  <div class="card hi" id="tcard">
    <div class="ttop">
      <span class="cnt"><b id="cSel">0</b> seleccionados / <b id="cTot">0</b> registros</span>
      <div style="display:flex;gap:6px">
        <button class="bs" id="btnSA">Seleccionar todos</button>
        <button class="bs" id="btnDA">Deseleccionar</button>
      </div>
    </div>
    <div class="tw">
      <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
    </div>
    <div class="abar">
      <div class="row" style="gap:8px;align-items:center">
        <div class="msel">
          <div class="mdisp" id="md1" tabindex="0"><span id="ml1">Grupos a agregar</span><span>▾</span></div>
          <div class="mdrop" id="mdd1">
            <div class="msrch"><input type="text" id="ms1s" placeholder="Buscar..."></div>
            <div class="mopts" id="ms1o"></div>
          </div>
        </div>
        <button class="bg" id="btnAdd">Agregar grupos</button>
      </div>
      <div class="dvd"></div>
      <div class="row" style="gap:8px;align-items:center">
        <div class="msel">
          <div class="mdisp" id="md2" tabindex="0"><span id="ml2">Grupos a eliminar</span><span>▾</span></div>
          <div class="mdrop" id="mdd2">
            <div class="msrch"><input type="text" id="ms2s" placeholder="Buscar..."></div>
            <div class="mopts" id="ms2o"></div>
          </div>
        </div>
        <button class="br" id="btnRem">Eliminar grupos</button>
      </div>
    </div>
  </div>

  <!-- Confirmation modal -->
  <div class="backdrop" id="mConf">
    <div class="modal">
      <h3>Confirmar operación</h3>
      <div id="confSum"></div>
      <div class="ma">
        <button class="bs" id="btnCC">Cancelar</button>
        <button class="bp" id="btnOK">Confirmar y ejecutar</button>
      </div>
    </div>
  </div>

  <!-- Progress modal -->
  <div class="backdrop" id="mProg">
    <div class="modal">
      <h3 id="progTitle">Procesando...</h3>
      <div class="pbar"><div id="pbar" style="width:0"></div></div>
      <p class="pcnt" id="progTxt">0 / 0</p>
      <div class="plog" id="plog"></div>
      <div class="ma"><button class="bs hi" id="btnCP">Cerrar</button></div>
    </div>
  </div>

</div>

<div id="gm-access-denied" style="display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;font-family:'Segoe UI',Arial,sans-serif;gap:12px">
  <div style="font-size:48px">&#128274;</div>
  <h2 style="color:#c62828;margin:0;font-size:20px">Acceso no autorizado</h2>
  <p style="color:#666;margin:0;font-size:14px">No ten&#233;s permisos para acceder a esta herramienta.</p>
</div>

<script>
(function () {
  // Inject styles at runtime so Geotab cannot strip them (it discards <head> content)
  (function injectStyles() {
    if (document.getElementById('gm-styles')) return;
    var s = document.createElement('style');
    s.id = 'gm-styles';
    s.textContent = [
      '#groupManager{padding:16px;max-width:1400px;margin:0 auto;font-family:\'Segoe UI\',Arial,sans-serif;color:#333;font-size:14px;box-sizing:border-box}',
      '#groupManager *{box-sizing:border-box}',
      '#groupManager .card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:18px;margin-bottom:12px}',
      '#groupManager h1{color:#0076be;font-size:20px;font-weight:600;margin:0}',
      '#groupManager .sub{color:#666;font-size:12px;margin-top:3px}',
      '#groupManager .tabs{display:flex;gap:8px;margin-bottom:14px}',
      '#groupManager .tab{padding:7px 18px;border-radius:8px;border:2px solid #ddd;cursor:pointer;font-size:13px;font-weight:500;background:#fff;transition:.2s}',
      '#groupManager .tab.active{background:#0076be;color:#fff;border-color:#0076be}',
      '#groupManager .row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end}',
      '#groupManager .fg{display:flex;flex-direction:column;gap:4px}',
      '#groupManager label{font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.4px}',
      '#groupManager input[type=text]{padding:7px 10px;border:1.5px solid #d0d7de;border-radius:7px;font-size:13px;outline:none;width:200px;font-family:inherit}',
      '#groupManager input[type=text]:focus{border-color:#0076be}',
      '#groupManager button{padding:7px 14px;border:none;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;transition:.2s;font-family:inherit}',
      '#groupManager .bp{background:#0076be;color:#fff}#groupManager .bp:hover{background:#005a9e}',
      '#groupManager .bs{background:#f0f2f5;color:#333;border:1.5px solid #ddd}#groupManager .bs:hover{background:#e3e5e8}',
      '#groupManager .bg{background:#28a745;color:#fff}#groupManager .bg:hover{background:#218838}',
      '#groupManager .br{background:#dc3545;color:#fff}#groupManager .br:hover{background:#c82333}',
      '#groupManager button:disabled{opacity:.45;cursor:not-allowed}',
      '#groupManager .ttop{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}',
      '#groupManager .cnt{font-size:12px;color:#666}',
      '#groupManager .tw{overflow:auto;max-height:460px;border-radius:8px;border:1px solid #e0e0e0}',
      '#groupManager table{width:100%;border-collapse:collapse}',
      '#groupManager thead{position:sticky;top:0;background:#f8f9fa;z-index:1}',
      '#groupManager th{padding:9px 11px;text-align:left;font-weight:600;font-size:12px;color:#555;border-bottom:2px solid #e0e0e0;cursor:pointer;white-space:nowrap;user-select:none}',
      '#groupManager th:hover{background:#e9ecef}',
      '#groupManager th.asc::after{content:" ↑"}#groupManager th.desc::after{content:" ↓"}',
      '#groupManager td{padding:8px 11px;border-bottom:1px solid #f0f0f0;font-size:13px;max-width:300px}',
      '#groupManager tr:hover td{background:#f8f9ff}',
      '#groupManager tr.sel td{background:#e8f0fe}',
      '#groupManager .tags{display:flex;flex-wrap:wrap;gap:3px}',
      '#groupManager .tag{background:#e3f2fd;color:#1565c0;padding:2px 7px;border-radius:10px;font-size:11px;white-space:nowrap}',
      '#groupManager .abar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid #f0f0f0}',
      '#groupManager .dvd{width:1px;height:30px;background:#ddd}',
      '#groupManager .msel{position:relative;min-width:190px}',
      '#groupManager .mdisp{padding:7px 10px;border:1.5px solid #d0d7de;border-radius:7px;cursor:pointer;font-size:13px;background:#fff;display:flex;align-items:center;justify-content:space-between;gap:6px;white-space:nowrap}',
      '#groupManager .mdisp:hover{border-color:#0076be}',
      '#groupManager .mdrop{position:absolute;top:calc(100% + 3px);left:0;min-width:220px;background:#fff;border:1.5px solid #d0d7de;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:99;max-height:240px;display:none;flex-direction:column}',
      '#groupManager .mdrop.open{display:flex}',
      '#groupManager .msrch{padding:7px;border-bottom:1px solid #eee;flex-shrink:0}',
      '#groupManager .msrch input{width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;outline:none}',
      '#groupManager .mopts{overflow-y:auto}',
      '#groupManager .mopt{padding:7px 10px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:8px;user-select:none}',
      '#groupManager .mopt:hover{background:#f0f2f5}',
      '#groupManager .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}',
      '#groupManager .backdrop.open{display:flex}',
      '#groupManager .modal{background:#fff;border-radius:14px;padding:26px;max-width:480px;width:95%;box-shadow:0 8px 32px rgba(0,0,0,.2)}',
      '#groupManager .modal h3{font-size:17px;margin-bottom:14px;margin-top:0}',
      '#groupManager .si{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px}',
      '#groupManager .si:last-child{border:none}',
      '#groupManager .si b{text-align:right;max-width:65%}',
      '#groupManager .ma{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}',
      '#groupManager .pbar{background:#e0e0e0;border-radius:6px;height:10px;overflow:hidden;margin:10px 0}',
      '#groupManager .pbar div{background:#0076be;height:100%;transition:width .3s;border-radius:6px}',
      '#groupManager .pcnt{font-size:12px;text-align:center;color:#666;margin-bottom:4px}',
      '#groupManager .plog{max-height:120px;overflow-y:auto;font-size:11px;color:#555;margin-top:6px;line-height:1.6}',
      '#groupManager .sts{padding:9px 13px;border-radius:7px;font-size:12px;margin-top:10px}',
      '#groupManager .si_{background:#e3f2fd;color:#1565c0}',
      '#groupManager .ss{background:#e8f5e9;color:#2e7d32}',
      '#groupManager .se{background:#ffebee;color:#c62828}',
      '#groupManager .spin{display:inline-block;width:12px;height:12px;border:2px solid #c0d8f0;border-top-color:#0076be;border-radius:50%;animation:gm-sp .7s linear infinite;vertical-align:middle;margin-right:5px}',
      '@keyframes gm-sp{to{transform:rotate(360deg)}}',
      '#groupManager .nc{text-align:center;padding:32px;color:#aaa}',
      '#groupManager .hi{display:none!important}'
    ].join('');
    document.head.appendChild(s);
  }());

  var api, entityType = 'User';
  var allE = [], allG = [], childrenMap = {}, groupNameMap = {}, filtered = [], selIds = new Set();
  var gs = [new Set(), new Set(), new Set()]; // [filterGroups, addGroups, removeGroups]
  var sortC = 'name', sortD = 1, pendingOp = null;
  var $ = function (id) { return document.getElementById(id); };
  // User entities use 'companyGroups'; Device entities use 'groups'
  function grpKey() { return entityType === 'User' ? 'companyGroups' : 'groups'; }
  function grpsOf(e) { return e[grpKey()] || []; }

  // ─── MultiSelect ───────────────────────────────────────────────────────────
  function MS(idx, placeholder, onChange) {
    var sel = gs[idx];
    var disp = $('md' + idx), lbl = $('ml' + idx), drop = $('mdd' + idx);
    var srch = $('ms' + idx + 's'), opts = $('ms' + idx + 'o');
    var items = [];

    // Deselect-all button
    var dsBtnRow = document.createElement('div');
    dsBtnRow.style.cssText = 'padding:4px 7px;border-bottom:1px solid #eee;flex-shrink:0';
    var dsBtn = document.createElement('button');
    dsBtn.className = 'bs';
    dsBtn.textContent = 'Deseleccionar todos';
    dsBtn.style.cssText = 'font-size:11px;padding:2px 8px;width:100%';
    dsBtn.addEventListener('click', function () {
      sel.clear();
      lbl.textContent = placeholder;
      render();
      if (onChange) onChange();
    });
    dsBtnRow.appendChild(dsBtn);
    opts.parentNode.insertBefore(dsBtnRow, opts);

    disp.addEventListener('click', function (e) { e.stopPropagation(); toggle(); });
    srch.addEventListener('input', render);
    document.addEventListener('click', function () { drop.classList.remove('open'); });
    drop.addEventListener('click', function (e) { e.stopPropagation(); });

    function toggle() { drop.classList.toggle('open'); if (drop.classList.contains('open')) { srch.focus(); render(); } }

    function render() {
      var q = srch.value.toLowerCase();
      opts.innerHTML = items
        .filter(function (g) { return g.name.toLowerCase().includes(q); })
        .map(function (g) {
          return '<div class="mopt" data-id="' + g.id + '"><input type="checkbox"' + (sel.has(g.id) ? ' checked' : '') + '>' + esc(g.name) + '</div>';
        }).join('');
      opts.querySelectorAll('.mopt').forEach(function (d) {
        var chk = d.querySelector('input');
        var id = d.dataset.id;
        // Clicking the text area: manually toggle the checkbox
        d.addEventListener('click', function (e) {
          if (e.target === chk) return;
          chk.checked = !chk.checked;
          updateSel(id, chk.checked);
        });
        // Clicking the checkbox directly: read state after browser commits the toggle
        chk.addEventListener('change', function () {
          updateSel(id, this.checked);
        });
      });
    }

    function updateSel(id, checked) {
      checked ? sel.add(id) : sel.delete(id);
      lbl.textContent = sel.size ? sel.size + ' grupo(s)' : placeholder;
      if (onChange) onChange();
    }

    return {
      setItems: function (arr) { items = arr; render(); },
      clear: function () { sel.clear(); lbl.textContent = placeholder; render(); }
    };
  }

  var ms = [];

  // ─── Init ──────────────────────────────────────────────────────────────────
  function init() {
    ms[0] = MS(0, 'Todos los grupos', applyFilter);
    ms[1] = MS(1, 'Grupos a agregar');
    ms[2] = MS(2, 'Grupos a eliminar');

    document.querySelectorAll('.tab').forEach(function (t) {
      t.addEventListener('click', function () {
        document.querySelectorAll('.tab').forEach(function (x) { x.classList.remove('active'); });
        this.classList.add('active');
        entityType = this.dataset.type;
        reset();
      });
    });

    $('fName').addEventListener('input', applyFilter);
    $('btnLoad').addEventListener('click', loadData);
    $('btnClr').addEventListener('click', function () { $('fName').value = ''; gs[0].clear(); ms[0].clear(); applyFilter(); });
    $('btnSA').addEventListener('click', function () { filtered.forEach(function (e) { selIds.add(e.id); }); renderTable(); });
    $('btnDA').addEventListener('click', function () { selIds.clear(); renderTable(); });
    $('btnAdd').addEventListener('click', function () { confirmOp('add'); });
    $('btnRem').addEventListener('click', function () { confirmOp('remove'); });
    $('btnCC').addEventListener('click', function () { $('mConf').classList.remove('open'); });
    $('btnOK').addEventListener('click', execOp);
    $('btnCP').addEventListener('click', function () { $('mProg').classList.remove('open'); });
  }

  function reset() {
    allE = []; filtered = []; selIds.clear();
    ms.forEach(function (m) { if (m) m.clear(); });
    $('tcard').classList.add('hi');
    $('sts').classList.add('hi');
    $('fName').value = '';
  }

  function setStatus(cls, msg) {
    var el = $('sts'); el.className = 'sts ' + cls; el.innerHTML = msg; el.classList.remove('hi');
  }

  // ─── Load Data ─────────────────────────────────────────────────────────────
  function loadData() {
    setStatus('si_', '<span class="spin"></span> Cargando datos...');
    $('btnLoad').disabled = true;

    api.call('Get', { typeName: 'Group' }, function (groups) {
      // Build children map from ALL groups for hierarchical filtering
      childrenMap = {};
      groupNameMap = {};
      groups.forEach(function (g) {
        childrenMap[g.id] = (g.children || []).map(function (c) { return c.id; });
        groupNameMap[g.id] = g.name || g.id;
      });

      // Only show user-created (custom) groups; system groups have descriptive IDs, custom ones are base-36 starting with 'b'
      allG = groups
        .filter(function (g) { return g.name && /^b[0-9a-zA-Z]+$/.test(g.id); })
        .sort(function (a, b) { return a.name.localeCompare(b.name); });

      ms.forEach(function (m) { if (m) m.setItems(allG); });

      api.call('Get', { typeName: entityType, resultsLimit: 50000 }, function (entities) {
        allE = entities;
        $('btnLoad').disabled = false;
        setStatus('ss', '✅ ' + entities.length + ' ' + (entityType === 'User' ? 'usuarios' : 'activos') + ' · ' + allG.length + ' grupos disponibles');
        applyFilter();
        $('tcard').classList.remove('hi');
      }, function (err) {
        $('btnLoad').disabled = false;
        setStatus('se', '❌ Error al cargar ' + entityType + ': ' + err);
      });
    }, function (err) {
      $('btnLoad').disabled = false;
      setStatus('se', '❌ Error al cargar grupos: ' + err);
    });
  }

  // ─── Filter & Table ────────────────────────────────────────────────────────
  function applyFilter() {
    var q = $('fName').value.toLowerCase();
    var gf = Array.from(gs[0]);

    // Expand selected groups to include all descendants (hierarchical match)
    var expandedIds = new Set();
    if (gf.length) {
      var stack = gf.slice();
      while (stack.length) {
        var cur = stack.pop();
        if (!expandedIds.has(cur)) {
          expandedIds.add(cur);
          (childrenMap[cur] || []).forEach(function (kid) { stack.push(kid); });
        }
      }
    }

    filtered = allE.filter(function (e) {
      if (q && !(e.name || '').toLowerCase().includes(q)) return false;
      if (expandedIds.size) {
        var eg = grpsOf(e).map(function (g) { return String(g.id); });
        if (!eg.some(function (id) { return expandedIds.has(id); })) return false;
      }
      return true;
    });
    renderTable();
  }

  var colDefs = {
    User: [['name', 'Nombre'], ['userName', 'Usuario'], ['groups', 'Grupos']],
    Device: [['name', 'Nombre'], ['serialNumber', 'N/S'], ['groups', 'Grupos']]
  };

  function renderTable() {
    var cols = colDefs[entityType];
    var sorted = filtered.slice().sort(function (a, b) {
      var va = (a[sortC] || '').toString().toLowerCase();
      var vb = (b[sortC] || '').toString().toLowerCase();
      return va < vb ? -sortD : va > vb ? sortD : 0;
    });

    // Header
    $('thead').innerHTML = '<tr><th><input type="checkbox" id="chkA"></th>'
      + cols.map(function (c) {
        var cls = sortC === c[0] ? (sortD > 0 ? 'asc' : 'desc') : '';
        return '<th class="' + cls + '" data-col="' + c[0] + '">' + c[1] + '</th>';
      }).join('') + '</tr>';

    // Body
    if (!sorted.length) {
      $('tbody').innerHTML = '<tr><td colspan="' + (cols.length + 1) + '" class="nc">Sin resultados para los filtros aplicados</td></tr>';
    } else {
      $('tbody').innerHTML = sorted.map(function (e) {
        var tags = grpsOf(e).map(function (g) {
          return '<span class="tag">' + esc(groupNameMap[g.id] || g.id) + '</span>';
        }).join('');
        return '<tr class="' + (selIds.has(e.id) ? 'sel' : '') + '" data-id="' + e.id + '">'
          + '<td><input type="checkbox"' + (selIds.has(e.id) ? ' checked' : '') + '></td>'
          + cols.map(function (c) {
            if (c[0] === 'groups') return '<td><div class="tags">' + (tags || '<span style="color:#ccc">—</span>') + '</div></td>';
            return '<td>' + esc(e[c[0]] || '') + '</td>';
          }).join('') + '</tr>';
      }).join('');
    }

    // Sort click
    $('thead').querySelectorAll('th[data-col]').forEach(function (th) {
      th.addEventListener('click', function () {
        sortC === this.dataset.col ? sortD *= -1 : (sortC = this.dataset.col, sortD = 1);
        renderTable();
      });
    });

    // Select-all header checkbox
    var ca = $('chkA');
    if (ca) ca.addEventListener('change', function () {
      if (this.checked) filtered.forEach(function (e) { selIds.add(e.id); });
      else selIds.clear();
      renderTable();
    });

    // Row checkboxes
    $('tbody').querySelectorAll('tr[data-id]').forEach(function (tr) {
      tr.querySelector('input').addEventListener('change', function () {
        this.checked ? selIds.add(tr.dataset.id) : selIds.delete(tr.dataset.id);
        tr.classList.toggle('sel', this.checked);
        updateCnt();
      });
    });

    updateCnt();
    $('cTot').textContent = filtered.length;
  }

  function updateCnt() { $('cSel').textContent = selIds.size; }

  // ─── Confirm ───────────────────────────────────────────────────────────────
  function confirmOp(op) {
    if (!selIds.size) { alert('Seleccioná al menos una entidad.'); return; }
    var grps = Array.from(gs[op === 'add' ? 1 : 2]);
    if (!grps.length) { alert('Seleccioná al menos un grupo.'); return; }
    var gnames = grps.map(function (id) { var g = allG.find(function (x) { return x.id === id; }); return g ? g.name : id; }).join(', ');
    $('confSum').innerHTML = [
      ['Tipo de entidad', entityType === 'User' ? 'Usuarios' : 'Activos'],
      ['Entidades seleccionadas', selIds.size],
      ['Operación', op === 'add' ? 'Agregar grupos' : 'Eliminar grupos'],
      ['Grupos', gnames]
    ].map(function (r) { return '<div class="si"><span>' + r[0] + '</span><b>' + esc(String(r[1])) + '</b></div>'; }).join('');
    pendingOp = { op: op, groups: grps };
    $('mConf').classList.add('open');
  }

  // ─── Execute ───────────────────────────────────────────────────────────────
  function execOp() {
    $('mConf').classList.remove('open');
    var op = pendingOp.op, gids = pendingOp.groups;
    var entities = Array.from(selIds)
      .map(function (id) { return allE.find(function (e) { return e.id === id; }); })
      .filter(Boolean);
    var total = entities.length, done = 0, errs = 0;

    $('progTitle').textContent = op === 'add' ? 'Agregando grupos...' : 'Eliminando grupos...';
    $('pbar').style.width = '0%';
    $('progTxt').textContent = '0 / ' + total;
    $('plog').innerHTML = '';
    $('btnCP').classList.add('hi');
    $('mProg').classList.add('open');

    var queue = entities.slice(), active = 0, CONC = 8;

    function next() {
      while (active < CONC && queue.length) { active++; process(queue.shift()); }
      if (active === 0) finish();
    }

    function process(e) {
      var gk = grpKey();
      var currentGroups = (e[gk] || []).slice();
      var updatedGroups;
      if (op === 'add') {
        var cur = currentGroups.map(function (g) { return g.id; });
        updatedGroups = currentGroups.slice();
        gids.forEach(function (id) { if (cur.indexOf(id) < 0) updatedGroups.push({ id: id }); });
      } else {
        updatedGroups = currentGroups.filter(function (g) { return gids.indexOf(g.id) < 0; });
      }
      if (!updatedGroups.length) {
        updatedGroups = [{ id: 'GroupCompanyId' }];
      }
      var upd = { id: e.id };
      upd[gk] = updatedGroups;
      if (entityType === 'User') {
        upd.accessGroupFilter = null;
      }
      api.call('Set', { typeName: entityType, entity: upd }, function () {
        done++; active--;
        tick(done + errs, total);
        next();
      }, function (err) {
        errs++; active--;
        var l = $('plog');
        l.innerHTML += '<div style="color:#c62828">❌ ' + esc(e.name) + ': ' + esc(String(err)) + '</div>';
        l.scrollTop = l.scrollHeight;
        tick(done + errs, total);
        next();
      });
    }

    function tick(n, t) {
      $('pbar').style.width = Math.round(n / t * 100) + '%';
      $('progTxt').textContent = n + ' / ' + t;
    }

    function finish() {
      $('progTitle').textContent = 'Completado';
      $('progTxt').textContent = '✅ ' + done + ' OK' + (errs ? ' · ❌ ' + errs + ' errores' : '');
      $('btnCP').classList.remove('hi');
      selIds.clear();
      if (ms[1]) ms[1].clear();
      if (ms[2]) ms[2].clear();
      loadData();
    }

    next();
  }

  // ─── Util ──────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ─── Geotab Add-In entry point ─────────────────────────────────────────────
  geotab.addin.groupManager = function (api_, state_) {
    api = api_;
    return {
      initialize: function (freshApi, freshState, callback) {
        api = freshApi;

        api.getSession(function (session) {
          const gmUsuarioActual = (session.userName || '').toLowerCase().trim();

          const gmListaBlanca = [
            'fsoto@tsbsa.com.ar',
            'jm@cesetti.com.ar',
            'mt@cesetti.com.ar',
            'df@cesetti.com.ar'
          ];

          const gmAutorizado = gmListaBlanca.includes(gmUsuarioActual);
          const gmContenido = document.getElementById('groupManager');
          const gmDenegado = document.getElementById('gm-access-denied');

          if (gmAutorizado) {
            gmContenido.style.display = '';
            gmDenegado.style.display = 'none';
            init();
          } else {
            gmContenido.style.display = 'none';
            gmDenegado.style.display = 'flex';
          }

          callback();
        });
      },
      focus: function (freshApi) { api = freshApi; },
      blur: function () {}
    };
  };
}());
</script>
