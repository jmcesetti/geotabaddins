name: Geotab Add-In Auth

on:
  workflow_dispatch:
    inputs:
      email:
        description: "User email"
        required: true
        type: string
      password:
        description: "User password"
        required: true
        type: string

jobs:
  authenticate:
    runs-on: ubuntu-latest
    outputs:
      token: ${{ steps.generate_token.outputs.token }}
      status: ${{ steps.generate_token.outputs.status }}

    steps:
      - name: Validate credentials and generate JWT
        id: generate_token
        env:
          AUTH_EMAIL: ${{ secrets.AUTH_EMAIL }}
          AUTH_PASSWORD: ${{ secrets.AUTH_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INPUT_EMAIL: ${{ inputs.email }}
          INPUT_PASSWORD: ${{ inputs.password }}
        run: |
          # Validate credentials
          if [ "$INPUT_EMAIL" != "$AUTH_EMAIL" ] || [ "$INPUT_PASSWORD" != "$AUTH_PASSWORD" ]; then
            echo "status=invalid_credentials" >> "$GITHUB_OUTPUT"
            echo "token=" >> "$GITHUB_OUTPUT"
            echo "::error::Invalid credentials"
            exit 0
          fi

          # Build JWT manually (header.payload.signature using openssl HMAC-SHA256)
          # Header
          HEADER=$(echo -n '{"alg":"HS256","typ":"JWT"}' | base64 -w 0 | tr '+/' '-_' | tr -d '=')

          # Payload
          IAT=$(date +%s)
          EXP=$((IAT + 3600))   # 1 hour expiry
          PAYLOAD=$(printf '{"sub":"%s","iat":%d,"exp":%d}' "$INPUT_EMAIL" "$IAT" "$EXP" \
            | base64 -w 0 | tr '+/' '-_' | tr -d '=')

          # Signature (HMAC-SHA256)
          SIGNING_INPUT="$HEADER.$PAYLOAD"
          SIGNATURE=$(echo -n "$SIGNING_INPUT" \
            | openssl dgst -sha256 -hmac "$JWT_SECRET" -binary \
            | base64 -w 0 | tr '+/' '-_' | tr -d '=')

          TOKEN="$SIGNING_INPUT.$SIGNATURE"

          echo "status=ok" >> "$GITHUB_OUTPUT"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
