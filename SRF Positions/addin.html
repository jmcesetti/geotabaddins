<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SRF Positions Map Add-in</title>
</head>
<body>
    <script>
        console.log("[SRF] Script loading...");

        geotab.addin.srfPositions = function (elt, service) {
            console.log("[SRF] geotab.addin.srfPositions called");
            console.log("[SRF] elt:", elt);
            console.log("[SRF] service:", service);

            service.getSession(function (session) {
                console.log("[SRF] Session:", session);
                console.log("[SRF] Database:", session.database);
                console.log("[SRF] User:", session.userName);
                console.log("[SRF] SessionId:", session.sessionId);
            });
        };

        console.log("[SRF] Script loaded, geotab.addin.srfPositions defined");
    </script>
</body>
</html>
