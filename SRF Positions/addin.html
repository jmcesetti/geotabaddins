<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SRF Positions Map Add-in</title>
</head>
<body>
    <div id="srfPositions"></div>

    <script>
        console.log("[SRF] Script loading...");

        // ─── Geotab Add-In entry point ─────────────────────────────────────────────
        geotab.addin.srfPositions = function (api, state) {
            return {
                initialize: function (api, state, callback) {
                    window.geotabApi = api;
                    window.geotabMap = state.map;
                    console.log("SRF Positions initialized");
                        }
                    }
                    callback();
            };

        console.log("[SRF] Script loaded");
    </script>
</body>
</html>
