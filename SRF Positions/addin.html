<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SRF Positions Map Add-in</title>
</head>
<body>
    <script>
        console.log("[SRF] Script loading...");

        geotab.addin.srfPositions = function (elt, service) {
            console.log("[SRF] geotab.addin.srfPositions called");
            console.log("[SRF] elt:", elt);
            console.log("[SRF] service:", service);

            try {
                var circle = service.canvas.circle(
                    { lat: -38.2112142, lng: -69.2293903 },
                    12,
                    5
                )
                .change({
                    "fill": "#FF0000",
                    "fill-opacity": 0.7,
                    "stroke": "#CC0000",
                    "stroke-width": 2
                });

                console.log("[SRF] Circle drawn successfully");
            } catch (err) {
                console.error("[SRF] Error drawing circle:", err);
            }
        };

        console.log("[SRF] Script loaded, geotab.addin.srfPositions defined");
    </script>
</body>
</html>
