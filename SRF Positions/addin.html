<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SRF Positions Map Add-in</title>
</head>
<body>
    <script>
        console.log("[SRF] Script loading...");

        const SRFApi = (() => {
            let _api = null;

            function call(method, params) {
                return new Promise((resolve, reject) => {
                    _api.call(method, params,
                        result => resolve(result),
                        err => reject(err)
                    );
                });
            }

            async function getSession() {
                return new Promise((resolve, reject) => {
                    _api.getSession(
                        session => resolve(session),
                        err => reject(err)
                    );
                });
            }

            return {
                init: function (api) {
                    _api = api;
                    console.log("[SRF] API initialized");
                },
                call,
                getSession
            };
        })();

        geotab.addin.srfPositions = function (api_, state_) {
            console.log("[SRF] Module registered");

            return {
                initialize: function (freshApi, freshState, callback) {
                    console.log("[SRF] initialize() called");

                    SRFApi.init(freshApi);

                    SRFApi.getSession()
                        .then(session => {
                            console.log("[SRF] === SESSION DATA ===");
                            console.log("[SRF] Database:", session.database);
                            console.log("[SRF] User:", session.userName);
                            console.log("[SRF] SessionId:", session.sessionId);
                            callback();
                        })
                        .catch(err => {
                            console.error("[SRF] ERROR getting session:", err);
                            callback();
                        });
                },

                focus: function (freshApi) {
                    console.log("[SRF] focus() called");
                    SRFApi.init(freshApi);
                },

                blur: function () {
                    console.log("[SRF] blur() called");
                }
            };
        };

        console.log("[SRF] Script loaded successfully");
    </script>
</body>
</html>
