<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SRF Positions Map Add-in</title>
    <style>
        :root {
            --bg: #F4F7FB;
            --surface: #FFFFFF;
            --border: #D6E0EE;
            --text: #1A2333;
            --text-muted: #5A6A82;
            --text-label: #8A9BB5;
            --primary: #1565C0;
            --primary-hover: #0D47A1;
            --primary-tint: #E3F0FF;
            --online: #2E7D32;
            --online-tint: #E8F5E9;
            --offline: #B71C1C;
            --offline-tint: #FFEBEE;
            --unknown: #E65100;
            --unknown-tint: #FFF3E0;
            --divider: #E8EEF6;
            --shadow: 0 1px 3px rgba(21,101,192,0.08);
            --radius: 6px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0F1923;
                --surface: #182030;
                --border: #243044;
                --text: #E2EAF4;
                --text-muted: #7A8EA8;
                --text-label: #4A6080;
                --primary: #42A5F5;
                --primary-hover: #64B5F6;
                --primary-tint: #0D1F33;
                --online: #66BB6A;
                --online-tint: #0A1F0B;
                --offline: #EF5350;
                --offline-tint: #1F0A0A;
                --unknown: #FFA726;
                --unknown-tint: #1F1208;
                --divider: #1E2D42;
                --shadow: 0 1px 3px rgba(0,0,0,0.3);
            }
        }

        :root[data-theme="light"] {
            --bg: #F4F7FB;
            --surface: #FFFFFF;
            --border: #D6E0EE;
            --text: #1A2333;
            --text-muted: #5A6A82;
            --text-label: #8A9BB5;
            --primary: #1565C0;
            --primary-hover: #0D47A1;
            --primary-tint: #E3F0FF;
            --online: #2E7D32;
            --online-tint: #E8F5E9;
            --offline: #B71C1C;
            --offline-tint: #FFEBEE;
            --unknown: #E65100;
            --unknown-tint: #FFF3E0;
            --divider: #E8EEF6;
            --shadow: 0 1px 3px rgba(21,101,192,0.08);
        }

        :root[data-theme="dark"] {
            --bg: #0F1923;
            --surface: #182030;
            --border: #243044;
            --text: #E2EAF4;
            --text-muted: #7A8EA8;
            --text-label: #4A6080;
            --primary: #42A5F5;
            --primary-hover: #64B5F6;
            --primary-tint: #0D1F33;
            --online: #66BB6A;
            --online-tint: #0A1F0B;
            --offline: #EF5350;
            --offline-tint: #1F0A0A;
            --unknown: #FFA726;
            --unknown-tint: #1F1208;
            --divider: #1E2D42;
            --shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            font-size: 13px;
            color: var(--text);
            background: var(--bg);
            line-height: 1.4;
        }

        #srf-addin {
            display: flex;
            flex-direction: column;
            gap: 0;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        /* ── Header ─────────────────────────────── */
        .srf-header {
            padding: 12px 14px 10px;
            border-bottom: 1px solid var(--divider);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .srf-header-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: var(--text);
            text-transform: uppercase;
        }

        .srf-union-badge {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--primary);
            background: var(--primary-tint);
            padding: 2px 7px;
            border-radius: 10px;
            text-transform: uppercase;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ── Status bar ─────────────────────────── */
        .srf-statusbar {
            padding: 8px 14px;
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--bg);
            border-bottom: 1px solid var(--divider);
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 32px;
        }

        .srf-statusbar-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-label);
            flex-shrink: 0;
            transition: background 0.25s;
        }

        .srf-statusbar-dot.loading {
            background: var(--primary);
            animation: pulse 1s infinite;
        }

        .srf-statusbar-dot.ok {
            background: var(--online);
        }

        .srf-statusbar-dot.error {
            background: var(--offline);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* ── Controls ───────────────────────────── */
        .srf-controls {
            padding: 10px 14px;
            border-bottom: 1px solid var(--divider);
            display: flex;
            gap: 6px;
        }

        .srf-btn {
            flex: 1;
            padding: 7px 10px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: background 0.15s, opacity 0.15s;
            letter-spacing: 0.01em;
        }

        .srf-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .srf-btn--primary {
            background: var(--primary);
            color: #fff;
        }

        .srf-btn--primary:not(:disabled):hover {
            background: var(--primary-hover);
        }

        .srf-btn--ghost {
            background: var(--bg);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .srf-btn--ghost:not(:disabled):hover {
            background: var(--divider);
        }

        /* ── Device list ────────────────────────── */
        .srf-section-head {
            padding: 8px 14px 6px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .srf-section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-label);
        }

        .srf-count-badge {
            font-size: 10px;
            font-weight: 700;
            color: var(--primary);
            background: var(--primary-tint);
            padding: 1px 6px;
            border-radius: 8px;
            font-variant-numeric: tabular-nums;
        }

        .srf-device-list {
            max-height: 280px;
            overflow-y: auto;
            border-bottom: 1px solid var(--divider);
        }

        .srf-device-list::-webkit-scrollbar {
            width: 4px;
        }

        .srf-device-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .srf-device-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .srf-device-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-bottom: 1px solid var(--divider);
            cursor: pointer;
            transition: background 0.1s;
        }

        .srf-device-item:last-child {
            border-bottom: none;
        }

        .srf-device-item:hover {
            background: var(--bg);
        }

        .srf-device-item.active {
            background: var(--primary-tint);
        }

        .srf-device-status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .srf-device-status-dot.online  { background: var(--online); }
        .srf-device-status-dot.offline { background: var(--offline); }
        .srf-device-status-dot.unknown { background: var(--unknown); }

        .srf-device-info {
            flex: 1;
            min-width: 0;
        }

        .srf-device-name {
            font-weight: 600;
            font-size: 12px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .srf-device-meta {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 1px;
            font-variant-numeric: tabular-nums;
        }

        .srf-device-model {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-label);
            background: var(--divider);
            padding: 1px 5px;
            border-radius: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        /* ── Empty / error states ───────────────── */
        .srf-empty {
            padding: 24px 14px;
            text-align: center;
            color: var(--text-label);
            font-size: 12px;
            border-bottom: 1px solid var(--divider);
        }

        .srf-empty-icon {
            font-size: 22px;
            margin-bottom: 6px;
            display: block;
            opacity: 0.5;
        }

        /* ── Reference circle footer ────────────── */
        .srf-footer {
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .srf-ref-label {
            font-size: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .srf-ref-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #FF0000;
            opacity: 0.75;
            flex-shrink: 0;
        }

        .srf-toggle-btn {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 9px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            color: var(--text-muted);
            cursor: pointer;
            transition: background 0.15s;
        }

        .srf-toggle-btn:hover {
            background: var(--divider);
        }
    </style>
</head>
<body>
    <script>
        var TOKEN_URL = "https://raw.githubusercontent.com/jmcesetti/geotabaddins/refs/heads/main/SRF%20Positions/token.txt";
        var UNIONS_CSV_URL = "https://raw.githubusercontent.com/jmcesetti/geotabaddins/refs/heads/main/SRF%20Positions/unions.csv";
        var SURFSIGHT_API_BASE = "https://api-prod.surfsight.net/v2";

        var api;
        var unionData = null;

        // ── Data loaders ──────────────────────────────────────────────

        async function loadToken() {
            try {
                var res = await fetch(TOKEN_URL);
                if (!res.ok) throw new Error("HTTP " + res.status);
                window.srfToken = (await res.text()).trim();
                console.log("[SRF] Token loaded");
            } catch (err) {
                console.error("[SRF] Failed to load token:", err.message);
            }
        }

        async function loadUnionsData() {
            try {
                var res = await fetch(UNIONS_CSV_URL);
                if (!res.ok) throw new Error("HTTP " + res.status);
                var csv = await res.text();
                var lines = csv.trim().split("\n");
                var headers = lines[0].split(",");
                unionData = {};
                for (var i = 1; i < lines.length; i++) {
                    var values = lines[i].split(",");
                    var record = {};
                    headers.forEach(function (h, idx) {
                        record[h.trim()] = (values[idx] || "").trim();
                    });
                    if (record.geotabdb) {
                        unionData[record.geotabdb.toLowerCase()] = record;
                    }
                }
                console.log("[SRF] Unions loaded:", unionData);
            } catch (err) {
                console.error("[SRF] Failed to load unions:", err.message);
            }
        }

        function getUnionByDatabase(database) {
            if (!unionData || !database) return null;
            return unionData[database.toLowerCase()] || null;
        }

        // ── Surfsight API ─────────────────────────────────────────────

        async function fetchSurfsightDevices(unionId, token) {
            // Primary endpoint: organization devices list filtered by unionId
            var url = SURFSIGHT_API_BASE + "/organizations/" + encodeURIComponent(unionId) + "/devices";
            var res = await fetch(url, {
                headers: {
                    "Authorization": "Bearer " + token,
                    "Accept": "application/json"
                }
            });

            if (!res.ok) {
                var body = "";
                try { body = await res.text(); } catch (_) {}
                throw new Error("Surfsight API " + res.status + (body ? ": " + body.substring(0, 120) : ""));
            }

            var json = await res.json();

            // Normalize: API may return { data: [...] } or a bare array
            var raw = Array.isArray(json) ? json : (json.data || json.devices || json.results || []);

            return raw.map(function (d) {
                return {
                    imei:        d.imei        || d.deviceId   || d.id   || "",
                    name:        d.name        || d.deviceName || d.imei || "Sin nombre",
                    lat:         parseFloat(d.lat  || d.latitude  || d.gps && d.gps.lat  || 0),
                    lon:         parseFloat(d.lon  || d.longitude || d.gps && d.gps.lon  || 0),
                    status:     (d.status      || d.deviceStatus || "unknown").toLowerCase(),
                    deviceModel: d.deviceModel || d.model || d.type || ""
                };
            }).filter(function (d) {
                // Discard devices without valid GPS (both 0,0 is the null island)
                return !(d.lat === 0 && d.lon === 0);
            });
        }

        // ── Add-in entry point ────────────────────────────────────────

        var api;
        geotab.addin.srfPositions = function (api_, state_) {
            api = api_;
            return {
                initialize: function (freshApi, freshState, callback) {
                    api = freshApi;

                    Promise.all([loadToken(), loadUnionsData()]).then(function () {
                        // Try to get session, but continue even if it fails
                        try {
                            api.getSession(function (session) {
                                window.srfSession = {
                                    user:      session.userName  || "",
                                    sessionId: session.sessionId || "",
                                    database:  session.database  || ""
                                };
                                console.log("[SRF] Session loaded:", window.srfSession);

                                var elt = document.getElementById('srf-addin');
                                initializeAddIn(elt, api);
                                callback();
                            });
                        } catch (err) {
                            console.warn("[SRF] Session failed:", err.message);
                            // Initialize with empty session, allow continue
                            window.srfSession = {
                                user:      "",
                                sessionId: "",
                                database:  ""
                            };
                            var elt = document.getElementById('srf-addin');
                            initializeAddIn(elt, api);
                            callback();
                        }
                    });
                },
                focus: function (freshApi) {
                    api = freshApi;
                },
                blur: function () {}
            };
        };

        // ── UI + logic ────────────────────────────────────────────────

        function initializeAddIn(elt, apiRef) {
            // ── Resolve union ────────────────────────────────────────
            var union = getUnionByDatabase(window.srfSession.database);
            if (union) {
                window.srfSession.unionId   = union.id;
                window.srfSession.unionName = union.name;
            } else {
                console.warn("[SRF] No union for database:", window.srfSession.database);
            }

            console.log("[SRF] Union resolved:", union);

            // ── Render shell ─────────────────────────────────────────
            elt.innerHTML = [
                '<div id="srf-addin">',
                '  <div class="srf-header">',
                '    <span class="srf-header-title">SRF Positions</span>',
                '    <span class="srf-union-badge" id="srf-union-badge">',
                        union ? escHtml(union.name || union.id) : "Sin unión",
                '    </span>',
                '  </div>',
                '  <div class="srf-controls">',
                '    <button id="srf-load"  class="srf-btn srf-btn--primary">Cargar dispositivos</button>',
                '  </div>',
                '</div>'
            ].join("");

            var $loadBtn = elt.querySelector("#srf-load");

            // ── Load action ──────────────────────────────────────────
            $loadBtn.addEventListener("click", async function () {
                console.log("[SRF] Load button clicked");

                if (!window.srfToken) {
                    console.error("[SRF] Token not available");
                    return;
                }
                if (!window.srfSession.unionId) {
                    console.error("[SRF] No union ID for database:", window.srfSession.database);
                    return;
                }

                $loadBtn.disabled = true;

                try {
                    console.log("[SRF] Fetching devices from Surfsight API for union:", window.srfSession.unionId);
                    var devices = await fetchSurfsightDevices(
                        window.srfSession.unionId,
                        window.srfToken
                    );
                    console.log("[SRF] Devices fetched:", devices);
                } catch (err) {
                    console.error("[SRF] Surfsight error:", err);
                } finally {
                    $loadBtn.disabled = false;
                }
            });
        }

        // ── Utilities ─────────────────────────────────────────────────

        function escHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function capitalizeFirst(str) {
            if (!str) return str;
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // Bootstrap is handled inside geotab.addin.srfPositions via Promise.all.
    </script>
</body>
</html>
