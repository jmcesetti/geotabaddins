<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SRF Positions Map Add-in</title>
</head>
<body>
    <script>
        console.log("[SRF] Script loading...");

        var SRFApi = (function () {
            var _api = null;

            return {
                init: function (api) {
                    _api = api;
                    console.log("[SRF] API initialized");
                },

                getSession: function (callback) {
                    if (!_api) {
                        console.error("[SRF] API not initialized");
                        return;
                    }
                    _api.getSession(callback);
                },

                call: function (method, params, success, error) {
                    if (!_api) {
                        console.error("[SRF] API not initialized");
                        return;
                    }
                    _api.call(method, params, success, error);
                }
            };
        })();

        geotab.addin.srfPositions = function (api, state) {
            console.log("[SRF] Module loaded");

            return {
                initialize: function (freshApi, freshState, callback) {
                    console.log("[SRF] initialize() called");
                    try {
                        SRFApi.init(freshApi);

                        SRFApi.getSession(function (session) {
                            console.log("[SRF] === SESSION DATA ===");
                            console.log("[SRF] Database:", session.database);
                            console.log("[SRF] User:", session.userName);
                            console.log("[SRF] SessionId:", session.sessionId);
                            callback();
                        });
                    } catch (err) {
                        console.error("[SRF] ERROR in initialize:", err);
                        callback();
                    }
                },

                focus: function (freshApi, freshState, callback) {
                    console.log("[SRF] focus() called");
                    callback();
                },

                blur: function (freshApi, freshState, callback) {
                    console.log("[SRF] blur() called");
                    callback();
                }
            };
        };

        console.log("[SRF] Script loaded successfully");
    </script>
</body>
</html>
